name: research_data_app
description: A mobile app for basic medical research data management.
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=2.19.0 <3.0.0"
dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.5
  provider: ^6.0.5
  json_annotation: ^4.8.1
  flutter_spinkit: ^5.1.0
  cached_network_image: ^3.2.3
  intl: ^0.18.0
  flutter_localizations:
